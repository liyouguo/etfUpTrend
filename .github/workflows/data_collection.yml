name: ETF 上升趋势数据采集

on:
  schedule:
    # 每天 UTC 时间 1:40 运行 (北京时间 9:40)
    - cron: '40 1 * * *'
  workflow_dispatch:
    # 允许手动触发
    inputs:
      days_to_keep:
        description: '保留数据天数'
        required: false
        default: '10'

jobs:
  etf-data-collection:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: 缓存依赖
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') || 'no-requirements' }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 运行 ETF 数据采集
      run: python etf_uptrend_tracker.py
      continue-on-error: true

    - name: 上传输出文件
      uses: actions/upload-artifact@v4
      with:
        name: etf-output-${{ github.run_id }}
        path: output/
        retention-days: 10

    - name: 发送邮件通知
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.qq.com
        server_port: 465
        username: ${{ secrets.SMTP_USER }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: ETF 数据采集完成 - ${{ github.run_id }}
        body: |
          ETF 上升趋势数据采集任务已完成！
          
          任务详情：
          - 仓库：${{ github.repository }}
          - 工作流：${{ github.workflow }}
          - 运行 ID: ${{ github.run_id }}
          - 运行 URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - 触发方式：${{ github.event_name }}
          - 完成时间：${{ github.event.repository.updated_at }}
          
          数据文件已生成到 output/ 目录：
          - etf_uptrend_YYYYMMDD.json (详细数据)
          - etf_uptrend_YYYYMMDD.csv (表格数据)
          
          附件包含 CSV 文件供查阅。
          
          ---
          此邮件由 GitHub Actions 自动发送
        to: ${{ secrets.RECIPIENTS }}
        from: ETF 数据机器人 <${{ secrets.SMTP_USER }}>
        content_type: text/plain
        convert_markdown: false
        ignore_cert: true
        priority: high
        attachments: ./output/etf_uptrend_*.csv
